<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Membership Registration Form</title>
</head>

<body>

    <h1>Library Membership Registration Form</h1>

    <form action="#" method="post">
        
        <fieldset>

            <legend>Personal Information</legend>
            <label for="fullname">Full Name:</label>
            <input type="text" name="fullname" id="fullname" placeholder="Enter Full Name" required>
            <br><br>

            <label for="memberid">Membership ID:</label>
            <input type="text" name="memberid" id="memberid" placeholder="Enter Membership ID" required>
            <br><br>

            <label for="email">Email Address:</label>
            <input type="email" name="email" id="email" placeholder="Enter Email Address" required>
            <br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" placeholder="Enter Phone Number" required>
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" required>
            <br><br>

            Gender:
            <input type="radio" name="gender" id="male" value="Male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="Female">
            <label for="female">Female</label>

            <input type="radio" name="gender" id="other" value="Other">
            <label for="other">Other</label>

        </fieldset>
            
        <br>

        <fieldset>

            <legend>Membership Information</legend>
            <label for="membership">Membership Type:</label>
            <select name="membership" id="membership">

                <option value="Student" selected>Student</option>
                <option value="Faculty">Faculty</option>
                <option value="Researcher">Researcher</option>
                <option value="General Member">General Member</option>

            </select>

            <br><br>

            <label for="section">Preferred Library Section:</label>
            <select name="section" id="section">

                <option value="">Select Section</option>
                <option value="Science & Technology">Science & Technology</option>
                <option value="Literature">Literature</option>
                <option value="Business Studies">Business Studies</option>
                <option value="History">History</option>
                <option value="Arts & Culture">Arts & Culture</option>

            </select>

        </fieldset>

        <br>

        <fieldset>

            <legend>Reading Preferences</legend>
            Favorite Book Categories:
            <br><br>
            <input type="checkbox" name="category" id="fiction" value="Fiction">
            <label for="fiction">Fiction</label>
            <br>

            <input type="checkbox" name="category" id="nonfiction" value="Non-Fiction">
            <label for="nonfiction">Non-Fiction</label>
            <br>

            <input type="checkbox" name="category" id="science" value="Science">
            <label for="science">Science</label>
            <br>

            <input type="checkbox" name="category" id="technology" value="Technology">
            <label for="technology">Technology</label>
            <br>

            <input type="checkbox" name="category" id="biography" value="Biography">
            <label for="biography">Biography</label>
            <br>

            <input type="checkbox" name="category" id="history" value="History">
            <label for="history">History</label>

        </fieldset>

        <br>

        <fieldset>

            <legend>Library Services</legend>
            Select Services You Want to Use:
            <br><br>

            <input type="checkbox" name="service" id="borrow" value="Book Borrowing">
            <label for="borrow">Book Borrowing</label>
            <br>

            <input type="checkbox" name="service" id="digital" value="Digital Library Access">
            <label for="digital">Digital Library Access</label>
            <br>

            <input type="checkbox" name="service" id="reading" value="Reading Room">
            <label for="reading">Reading Room</label>
            <br>

            <input type="checkbox" name="service" id="research" value="Research Assistance">
            <label for="research">Research Assistance</label>

        </fieldset>

        <br>

        <fieldset>

            <legend>Additional Information</legend>
            <label for="address">Current Address:</label>
            <br>
            <textarea name="address" id="address" placeholder="Enter Current Address" required></textarea>
            <br><br>

            <label for="emergency">Emergency Contact Number:</label>
            <input type="tel" name="emergency" id="emergency" placeholder="Enter Emergency Contact Number" required>
            <br><br>

            <label for="reason">Reason for Joining the Library:</label>
            <br>
            <textarea name="reason" id="reason" placeholder="Write your reason" required></textarea>

            <br><br>

            <label for="suggestion">Suggestions for Library Improvement:</label>
            <br>
            <textarea name="suggestion" id="suggestion" maxlength="250" placeholder="Maximum 250 characters"></textarea>

        </fieldset>

        <br>

        <div style="text-align: center;">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        </div>

    </form>

</body>

</html>
